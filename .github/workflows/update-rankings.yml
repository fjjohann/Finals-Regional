name: Atualizar rankings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Coletar rankings
        run: python scripts/scrape_rankings.py

      - name: Commit se houver alteração
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza rankings"
          file_pattern: docs/data/rankings.json

